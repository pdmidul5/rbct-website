<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/rbct-website/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Royal Bengal Club Tasmania — celebrating Bengali culture, festivals, sport and community in Tasmania." />
    <meta name="theme-color" content="#150716" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Royal Bengal Club Tasmania</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Restores the original path after the public/404.html SPA redirect. -->
    <script>
      (function () {
        var l = window.location
        if (l.search[1] === 'p' && l.search[2] === '=') {
          var decoded = l.search.slice(3).split('&').map(function (s) {
            return s.replace(/~and~/g, '&')
          })
          var path = decoded.shift()
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + path + (decoded.length ? '?' + decoded.join('&') : '') + l.hash
          )
        }
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
