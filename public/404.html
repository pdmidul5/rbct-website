<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Royal Bengal Club Tasmania</title>
    <!--
      GitHub Pages serves this file for any unknown path (e.g. a direct refresh
      on /rbct-website/events). It redirects back to index.html while preserving
      the original path in a query string, which main.jsx / App.jsx restores via
      react-router-dom. This is the standard GitHub Pages SPA routing workaround.
    -->
    <script>
      var pathSegmentsToKeep = 1; // keeps '/rbct-website'
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
